apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: formation-dashboard
  namespace: openshift-gitops
spec:
  destination:
    namespace: formation-openshift
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/lyeschaya/exercice-formation-openshift-chapitre2.git
    targetRevision: main
    path: dashboard-openshift
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
