apiVersion: v1
kind: Pod
metadata:
  name: monitoring-pod
  namespace: paris-user-ns
spec:
  serviceAccountName: monitoring-sa
  containers:
    - name: monitoring
      image: registry.access.redhat.com/ubi8/ubi:latest
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: "1m"
          memory: "32Mi"
        limits:
          cpu: "50m"
          memory: "64Mi"
