apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-unprivileged-2
  labels:
    app: nginx-unprivileged-2
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-unprivileged-2
  template:
    metadata:
      labels:
        app: nginx-unprivileged-2
    spec:
      containers:
        - name: nginx
          image: ghcr.io/lyeschaya/nginx-formation:latest
          ports:
            - containerPort: 8080
          env:
            # TODO: Ajouter APP_MESSAGE depuis ConfigMap nginx-config-2
            # TODO: Ajouter USERNAME depuis Secret nginx-secret-2
            # TODO: Ajouter PASSWORD depuis Secret nginx-secret-2
