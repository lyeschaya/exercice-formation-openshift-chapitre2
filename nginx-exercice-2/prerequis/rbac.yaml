apiVersion: v1
kind: ServiceAccount
metadata:
  name: nginx-dashboard-sa
  namespace: formation-openshift
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nginx-dashboard-role
  namespace: formation-openshift
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["nginx-config-2"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["nginx-unprivileged-2"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nginx-dashboard-rb
  namespace: formation-openshift
subjects:
  - kind: ServiceAccount
    name: nginx-dashboard-sa
    namespace: formation-openshift
roleRef:
  kind: Role
  name: nginx-dashboard-role
  apiGroup: rbac.authorization.k8s.io