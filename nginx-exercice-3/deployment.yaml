apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-unprivileged
  namespace: exercice-nginx-3
  labels:
    app: nginx-unprivileged
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-unprivileged
  template:
    metadata:
      labels:
        app: nginx-unprivileged
    spec:
      containers:
        - name: nginx-unprivileged
          image: nginxinc/nginx-unprivileged:latest
          ports:
            - containerPort: 8080
